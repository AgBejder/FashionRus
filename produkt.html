<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product page</title>
    <link rel="stylesheet" href="css/produkt.css" />
    <link rel="stylesheet" href="Css/generel.css" />
  </head>

  <body>
    <header>
      <div class="gridfornav">
        <a href="Index.html"></a
        ><img src="img/logo.png" alt="FashionRus Logo" />
        <nav>
          <ul class="navlist">
            <li><a href="Index.html">Home</a></li>
            <li><a href="produktliste.html">Products</a></li>
            <li><a href="produkt.html">Specifics</a></li>
          </ul>
        </nav>
        <h1>Specifics</h1>
      </div>
    </header>
    <main class="product-page">
      <!-- Billede -->
      <section class="product-image">
        <img
          src="https://kea-alt-del.dk/t7/images/webp/640/1573.webp"
          alt="Product image"
        />
      </section>

      <!-- Produkt info -->
      <section class="product-info">
        <h1>Product Information</h1>

        <p><strong>Model name</strong><br />Nike Capri pants</p>
        <p><strong>Color</strong><br />Black</p>
        <p><strong>Inventory number</strong><br />1573</p>

        <h2>Nike</h2>
        <p>Nike, creating experiences for today’s athlete</p>
      </section>

      <!-- Købsboks -->
      <section class="product-buy">
        <h2>Nike Capri pants</h2>
        <p>Nike | Trousers</p>

        <label for="size">Choose a size</label>
        <select id="size">
          <option>S</option>
          <option>M</option>
          <option>L</option>
        </select>

        <button>Add to basket</button>
      </section>
    </main>
  </body>
</html>
